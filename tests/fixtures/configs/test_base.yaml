# tests/fixtures/configs/test_base.yaml
# Minimal configuration for unit tests
# Uses smallest viable values to keep tests fast

pipeline:
  name: "test_run"
  seed: 42
  device: "cpu"
  mixed_precision: false
  resume: false
  save_intermediates: false
  num_workers: 0
  pin_memory: false

wsi:
  supported_formats: [".tif", ".svs"]
  thumbnail:
    max_dim: 256
  tissue_detection:
    method: "otsu_hsv"
    min_tissue_ratio: 0.05
    morph_kernel_size: 5
    min_component_pixels: 100
  patch_extraction:
    patch_size: 64
    stride: 32
    target_mpp: 0.50
    blank_threshold: 230
    blur_threshold: 10.0
    min_tissue_coverage: 0.10

stain_normalization:
  method: "none"
  fail_on_error: false

segmentation:
  model_name: "deeplabv3plus_efficientnet_b3"
  n_classes: 6
  input_size: 64
  batch_size: 2
  checkpoint: null

detection:
  model_name: "faster_rcnn_resnet34"
  n_classes: 4
  input_size: 64
  batch_size: 2
  checkpoint: null
  min_confidence: 0.50
  nms_iou_threshold: 0.50
  target_mpp: 0.25

fusion:
  lymphocyte_class_id: 2
  stroma_class_id: 2
  min_stroma_area_mm2: 0.001
  aggregation: "weighted_mean"

validation:
  bootstrap_n: 100
  confidence_level: 0.95
  min_lymphocytes: 5
  max_ci_width: 50.0

logging:
  level: "WARNING"
  console: false
  file_rotation_mb: 1
  file_backup_count: 1

output:
  base_dir: "/tmp/pathoai_test_output"
  log_dir: "/tmp/pathoai_test_logs"
  model_dir: "/tmp/pathoai_test_models"
  save_segmentation_overlay: false
  save_detection_overlay: false
  save_stil_heatmap: false
  save_json_report: false
  save_patch_probs: false
  save_coordinate_map: false
