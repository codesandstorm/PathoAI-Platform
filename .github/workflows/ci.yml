# .github/workflows/ci.yml
# PathoAI-Platform — Continuous Integration
#
# Runs on every push and pull request to main/master.
# Enforces: linting, formatting, type checking, and full test suite.
#
# Milestone: 1.1

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  PATHOAI_ENV: "ci"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.1.0

      - name: Run ruff linter
        run: ruff check pathoai/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format --check pathoai/ tests/

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests + Coverage
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies (no PyTorch — CI-only)
        run: |
          pip install --upgrade pip
          pip install numpy scipy Pillow opencv-python-headless scikit-image
          pip install pandas scikit-learn PyYAML packaging
          pip install matplotlib tqdm
          pip install pytest pytest-cov

      - name: Install PathoAI package (editable)
        run: pip install -e . --no-deps

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=pathoai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 3: Integration Smoke Test
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy Pillow opencv-python-headless scikit-image
          pip install pandas scikit-learn PyYAML packaging
          pip install matplotlib tqdm
          pip install pytest pytest-cov
          pip install -e . --no-deps

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short || true
        # `|| true` because integration tests may be skipped in CI
        # (they require data that is not in the repository)

  # ---------------------------------------------------------------------------
  # Job 4: Repository Health Check
  # ---------------------------------------------------------------------------
  repo-health:
    name: Repository Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for accidental large files (> 10 MB)
        run: |
          git ls-files | xargs -I {} sh -c \
            'size=$(git cat-file -s "$(git ls-files -s {} | awk "{print \$2}")") 2>/dev/null; \
             [ "$size" -gt 10485760 ] && echo "LARGE FILE: {} ($size bytes)" && exit 1; \
             exit 0' || exit 1

      - name: Check for accidentally tracked data/model files
        run: |
          FORBIDDEN=$(git ls-files | grep -E \
            '\.(svs|ndpi|tif|tiff|scn|mrxs|pth|pt|ckpt|onnx|h5|pkl|npy|npz|hdf5|zip|tar|gz|bz2|7z)$' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "FORBIDDEN FILES IN GIT:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "Repository health check passed — no forbidden file types tracked."

      - name: Verify Python package imports correctly
        run: |
          pip install numpy scipy Pillow PyYAML packaging
          pip install -e . --no-deps
          python -c "
          import pathoai
          from pathoai.core import constants, exceptions
          from pathoai.core.utils import path_utils
          print('Package imports OK — version:', pathoai.__version__)
          "
